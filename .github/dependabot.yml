version: 2

updates:
  # Backend
  - package-ecosystem: "npm"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    groups:
      nestjs:
        patterns: ["@nestjs/*"]
      typeorm:
        patterns: ["typeorm", "@nestjs/typeorm"]
    ignore:
      # Only accept patch updates automatically for major deps
      - dependency-name: "typeorm"
        update-types: ["version-update:semver-major"]

  # Frontend
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    groups:
      angular:
        patterns: ["@angular/*", "@angular-devkit/*"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
