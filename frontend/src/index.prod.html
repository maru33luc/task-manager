<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>TaskFlow</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- ── Security meta tags (production) ──────────────────────────────── -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self';
                 script-src 'self';
                 style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
                 connect-src 'self' https://task-manager-api-2eb7.onrender.com;
                 img-src 'self' data:;
                 font-src 'self' https://fonts.gstatic.com;
                 object-src 'none';
                 frame-src 'none';
                 base-uri 'self';
                 form-action 'self';">
  <!-- frame-ancestors y X-Frame-Options solo funcionan como HTTP headers,
       no como meta tags — se aplican vía vercel.json en producción. -->

  <!-- ── Fonts ─────────────────────────────────────────────────────── -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">

  <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body>
  <app-root></app-root>
</body>
</html>
