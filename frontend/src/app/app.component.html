@if (authService.isAuthenticated()) {
  <!-- ── Navigation ──────────────────────────────────────────── -->
  <nav class="fixed top-0 left-0 right-0 z-50 h-14
              bg-ink-950/85 backdrop-blur-xl
              border-b border-white/[0.05]">
    <div class="max-w-6xl mx-auto px-5 sm:px-8 h-full flex items-center justify-between gap-6">

      <!-- Logo -->
      <a routerLink="/dashboard" (click)="closeMenu()"
         class="flex items-center gap-2.5 group flex-shrink-0">
        <div class="w-7 h-7 rounded bg-gold-500 flex items-center justify-center
                    shadow-md shadow-gold-900/50
                    group-hover:bg-gold-400 transition-colors duration-150">
          <svg class="w-4 h-4 text-ink-950" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                  d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
          </svg>
        </div>
        <span class="font-display font-bold text-white text-sm tracking-wide">
          Task<span class="text-gold-500">Flow</span>
        </span>
      </a>

      <!-- Desktop links -->
      <div class="hidden sm:flex items-center gap-0.5">
        <a routerLink="/dashboard" routerLinkActive="text-white border-b-gold-500"
           [routerLinkActiveOptions]="{ exact: false }"
           class="relative px-3.5 py-4 text-sm text-slate-500 hover:text-white
                  border-b-2 border-transparent transition-colors duration-150
                  font-display font-semibold tracking-wide">
          Dashboard
        </a>
        <a routerLink="/tasks" routerLinkActive="text-white border-b-gold-500"
           [routerLinkActiveOptions]="{ exact: false }"
           class="relative px-3.5 py-4 text-sm text-slate-500 hover:text-white
                  border-b-2 border-transparent transition-colors duration-150
                  font-display font-semibold tracking-wide">
          Tasks
        </a>
      </div>

      <!-- Right side -->
      <div class="flex items-center gap-3 ml-auto">
        <span class="hidden sm:block section-label">
          {{ authService.currentUser()?.name }}
        </span>

        <button class="hidden sm:inline-flex btn-secondary text-xs px-3 py-1.5"
                (click)="authService.logout()">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
          </svg>
          Sign out
        </button>

        <!-- Mobile hamburger -->
        <button class="sm:hidden w-8 h-8 flex items-center justify-center
                       rounded border border-white/10 text-slate-400
                       hover:text-white hover:border-white/20 transition-all duration-150"
                (click)="toggleMenu()">
          @if (menuOpen()) {
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          } @else {
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
          }
        </button>
      </div>
    </div>

    <!-- Mobile menu -->
    @if (menuOpen()) {
      <div class="sm:hidden animate-slide-down border-t border-white/[0.05]
                  bg-ink-950/95 backdrop-blur-xl">
        <div class="px-5 py-4 space-y-0.5">
          <a routerLink="/dashboard" routerLinkActive="text-white bg-white/[0.04]"
             class="flex items-center gap-2.5 px-3 py-2.5 rounded text-sm text-slate-500
                    hover:text-white font-display font-semibold tracking-wide transition-colors duration-150"
             (click)="closeMenu()">
            Dashboard
          </a>
          <a routerLink="/tasks" routerLinkActive="text-white bg-white/[0.04]"
             class="flex items-center gap-2.5 px-3 py-2.5 rounded text-sm text-slate-500
                    hover:text-white font-display font-semibold tracking-wide transition-colors duration-150"
             (click)="closeMenu()">
            Tasks
          </a>
          <div class="ruled mt-3 pt-3 flex items-center justify-between px-1">
            <span class="section-label">{{ authService.currentUser()?.name }}</span>
            <button class="btn-secondary text-xs px-3 py-1.5" (click)="authService.logout()">
              Sign out
            </button>
          </div>
        </div>
      </div>
    }
  </nav>
}

<main [class.pt-14]="authService.isAuthenticated()">
  <router-outlet />
</main>
