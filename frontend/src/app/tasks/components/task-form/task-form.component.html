<div class="glass-panel p-7">

  <!-- Header -->
  <div class="flex items-center justify-between mb-6">
    <div>
      <p class="section-label mb-1">{{ isEditing ? 'Edit' : 'Create' }}</p>
      <h2 class="font-display font-semibold text-white text-lg leading-snug">
        {{ isEditing ? 'Update task' : 'New task' }}
      </h2>
    </div>
    <button type="button"
            class="w-8 h-8 flex items-center justify-center rounded
                   border border-white/[0.08] text-slate-500
                   hover:text-white hover:border-white/20 transition-all duration-150"
            (click)="onCancel()">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
  </div>

  @if (errorMessage()) {
    <div class="mb-5 rounded bg-red-500/10 border border-red-500/20 px-3 py-2.5
                text-sm text-red-400 flex items-center gap-2.5 animate-fade-in">
      <svg class="w-4 h-4 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.28 7.22a.75.75 0 00-1.06 1.06L8.94 10l-1.72 1.72a.75.75 0 101.06 1.06L10 11.06l1.72 1.72a.75.75 0 101.06-1.06L11.06 10l1.72-1.72a.75.75 0 00-1.06-1.06L10 8.94 8.28 7.22z" clip-rule="evenodd"/>
      </svg>
      {{ errorMessage() }}
    </div>
  }

  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="space-y-4">

      <div>
        <label class="form-label" for="title">
          Title <span class="text-red-500 ml-0.5">*</span>
        </label>
        <input
          id="title" type="text" formControlName="title"
          class="form-input"
          [class.border-red-500]="titleControl.invalid && titleControl.touched"
          placeholder="What needs to be done?"
        />
        @if (titleControl.invalid && titleControl.touched) {
          <p class="mt-1.5 text-xs text-red-400">Title is required.</p>
        }
      </div>

      <div>
        <label class="form-label" for="description">Description</label>
        <textarea
          id="description" formControlName="description"
          class="form-input resize-none"
          rows="3"
          placeholder="Add more context…"
        ></textarea>
      </div>

      <div class="ruled pt-4 grid grid-cols-2 gap-4">
        <div>
          <label class="form-label" for="status">Status</label>
          <select id="status" formControlName="status" class="form-input cursor-pointer">
            @for (opt of statusOptions; track opt.value) {
              <option [value]="opt.value">{{ opt.label }}</option>
            }
          </select>
        </div>
        <div>
          <label class="form-label" for="priority">Priority</label>
          <select id="priority" formControlName="priority" class="form-input cursor-pointer">
            @for (opt of priorityOptions; track opt.value) {
              <option [value]="opt.value">{{ opt.label }}</option>
            }
          </select>
        </div>
      </div>

      <div>
        <label class="form-label" for="dueDate">Due date</label>
        <input id="dueDate" type="date" formControlName="dueDate" class="form-input" />
      </div>

      <div class="ruled pt-4 flex gap-2.5 justify-end">
        <button type="button" class="btn-secondary" (click)="onCancel()">Cancel</button>
        <button type="submit" class="btn-primary" [disabled]="isLoading()">
          @if (isLoading()) {
            <svg class="w-4 h-4 animate-spin-slow" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
            </svg>
            Saving…
          } @else {
            {{ isEditing ? 'Update task' : 'Create task' }}
          }
        </button>
      </div>

    </div>
  </form>
</div>
